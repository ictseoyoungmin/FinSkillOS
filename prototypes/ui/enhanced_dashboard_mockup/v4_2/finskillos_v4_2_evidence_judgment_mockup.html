<style>

*{box-sizing:border-box}html,body{margin:0;height:100%}body{background:radial-gradient(circle at 18% -10%,rgba(107,220,255,.09),transparent 28%),radial-gradient(circle at 82% -8%,rgba(185,156,255,.08),transparent 26%),var(--bg);color:var(--t0);font-family:var(--ui);overflow:hidden;font-size:13px}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:var(--noise);z-index:900;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.6'/%3E%3C/svg%3E")}

button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.app{height:100vh;display:grid;grid-template-rows:42px 28px 1fr}

/* OS tray */
.tray{height:42px;display:flex;align-items:center;background:color-mix(in srgb,var(--bg1) 92%,transparent);border-bottom:1px solid var(--line);backdrop-filter:blur(18px);z-index:30;min-width:0}
.brand{display:flex;align-items:center;gap:10px;width:218px;padding:0 14px;border-right:1px solid var(--line);flex:0 0 auto}.brand-mark{width:24px;height:24px;border-radius:8px;background:linear-gradient(135deg,var(--cyan2),var(--cyan));display:grid;place-items:center;box-shadow:var(--glow)}.brand-mark span{width:13px;height:13px;display:grid;grid-template-columns:1fr 1fr;gap:2px}.brand-mark i{display:block;border-radius:2px;background:rgba(255,255,255,.75)}.brand-text{font-family:var(--head);font-size:15px;font-weight:800;letter-spacing:.03em}.brand-text em{font-style:normal;color:var(--cyan)}
.nav{display:flex;align-items:stretch;height:100%;flex:1;min-width:0;overflow:hidden}.nav-btn{color:var(--t2);background:transparent;height:100%;padding:0 9px;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap;transition:.14s}.nav-btn:hover{color:var(--t1);background:color-mix(in srgb,var(--bg2) 70%,transparent)}.nav-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);background:color-mix(in srgb,var(--cyan) 7%,transparent)}.nav-dot{width:6px;height:6px;border-radius:999px;background:currentColor;opacity:.55}.nav-btn.active .nav-dot{opacity:1;box-shadow:0 0 10px currentColor}
.tray-right{display:flex;align-items:center;gap:8px;padding:0 12px;border-left:1px solid var(--line);flex:0 0 auto}.pill{display:inline-flex;align-items:center;gap:6px;min-height:22px;padding:0 9px;border-radius:999px;border:1px solid var(--line);color:var(--t2);background:color-mix(in srgb,var(--bg2) 74%,transparent);font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase}.pill:before{content:"";width:6px;height:6px;border-radius:99px;background:currentColor}.pill.good{color:var(--green);border-color:color-mix(in srgb,var(--green) 35%,var(--line))}.pill.warn{color:var(--amber);border-color:color-mix(in srgb,var(--amber) 40%,var(--line))}.pill.info{color:var(--cyan);border-color:color-mix(in srgb,var(--cyan) 35%,var(--line))}.pill.danger{color:var(--red);border-color:color-mix(in srgb,var(--red) 35%,var(--line))}
.cmd-btn,.theme-btn{display:inline-flex;align-items:center;gap:7px;height:28px;border-radius:999px;border:1px solid var(--line);padding:0 10px;background:var(--bg2);color:var(--t1);font-family:var(--mono);font-size:10px;letter-spacing:.08em}.cmd-btn kbd{color:var(--cyan);border:1px solid var(--line3);padding:1px 5px;border-radius:4px;background:var(--bg1)}.clock{min-width:82px;color:var(--t2);font-family:var(--mono);font-size:11px;text-align:right}

/* ticker */
.ticker-strip{position:relative;height:28px;border-bottom:1px solid var(--line2);background:color-mix(in srgb,var(--bg1) 88%,transparent);overflow:hidden}.ticker-strip:before,.ticker-strip:after{content:"";position:absolute;top:0;bottom:0;width:80px;z-index:2}.ticker-strip:before{left:0;background:linear-gradient(90deg,var(--bg1),transparent)}.ticker-strip:after{right:0;background:linear-gradient(-90deg,var(--bg1),transparent)}.ticker-scroll{height:100%;display:flex;align-items:center;gap:26px;padding:0 80px;width:max-content;animation:tickerMove 48s linear infinite}@keyframes tickerMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}.ticker-item{display:flex;gap:7px;align-items:baseline;font-family:var(--mono);font-size:11px;white-space:nowrap}.ticker-symbol{color:var(--t0);font-weight:700}.ticker-price{color:var(--t2)}.ticker-change.up{color:var(--green)}.ticker-change.down{color:var(--red)}

/* layout */
.workspace{position:relative;min-height:0;overflow:hidden}.page{position:absolute;inset:0;display:none;opacity:0;transition:opacity .16s;min-width:0;min-height:0}.page.active{display:block;opacity:1}.page-shell{height:100%;min-height:0;padding:12px;overflow:hidden}
.tab-grid{display:grid;grid-template-rows:auto 1fr;gap:12px;height:100%;min-height:0}.detail-grid{display:grid;grid-template-columns:340px minmax(520px,1fr) 360px;gap:12px;min-height:0;height:100%}.column{display:flex;flex-direction:column;gap:12px;min-height:0}.scroll{overflow:auto;padding-right:2px}.scroll::-webkit-scrollbar{width:5px;height:5px}.scroll::-webkit-scrollbar-thumb{background:var(--line3);border-radius:10px}

/* panels */
.panel{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),color-mix(in srgb,var(--panel2) 90%,transparent));border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden}.panel.soft{box-shadow:none}.panel-head{min-height:38px;padding:0 12px;border-bottom:1px solid var(--line2);background:color-mix(in srgb,var(--bg2) 70%,transparent);display:flex;align-items:center;gap:8px}.window-dots{display:flex;gap:5px;margin-right:4px}.window-dots span{width:8px;height:8px;border-radius:99px}.window-dots span:nth-child(1){background:#ff5f57}.window-dots span:nth-child(2){background:#febc2e}.window-dots span:nth-child(3){background:#28c840}.panel-title{flex:1;color:var(--t2);font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase}.panel-badge{color:var(--cyan);border:1px solid color-mix(in srgb,var(--cyan) 35%,var(--line));background:color-mix(in srgb,var(--cyan) 10%,transparent);padding:2px 8px;border-radius:999px;font-family:var(--mono);font-size:9px;letter-spacing:.08em}.panel-body{padding:12px}

/* judgment header */
.judgment{display:grid;grid-template-columns:minmax(390px,1.15fr) minmax(320px,.85fr) minmax(280px,.7fr);gap:12px}.judgment-main{padding:16px 16px 14px}.eyebrow{color:var(--t2);font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase}.judgment-title{margin-top:6px;font-family:var(--head);font-size:30px;line-height:1.05;font-weight:850;letter-spacing:-.035em}.judgment-title .accent{color:var(--green);text-shadow:0 0 24px color-mix(in srgb,var(--green) 25%,transparent)}.judgment-summary{margin-top:10px;color:var(--t1);line-height:1.55}.confidence-row{display:flex;gap:8px;align-items:center;margin-top:10px}.confidence-meter{height:8px;flex:1;border-radius:999px;background:var(--bg3);border:1px solid var(--line2);overflow:hidden}.confidence-meter span{display:block;height:100%;width:var(--w);border-radius:999px;background:linear-gradient(90deg,var(--cyan2),var(--cyan))}
.driver-list,.conflict-list,.watch-list{display:flex;flex-direction:column;gap:8px}.driver,.conflict,.watch{border:1px solid var(--line2);border-radius:var(--r-md);background:color-mix(in srgb,var(--bg2) 82%,transparent);padding:9px 10px}.driver{display:grid;grid-template-columns:32px 1fr;gap:8px}.driver-score{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;font-family:var(--head);font-weight:850;color:var(--cyan);background:color-mix(in srgb,var(--cyan) 11%,transparent);border:1px solid color-mix(in srgb,var(--cyan) 25%,var(--line))}.driver-title,.conflict-title,.watch-title{font-weight:750;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.driver-note,.conflict-note,.watch-note{color:var(--t2);font-size:11px;line-height:1.45;margin-top:2px}

/* evidence */
.evidence-card{border:1px solid var(--line2);border-radius:var(--r-md);background:color-mix(in srgb,var(--bg2) 82%,transparent);padding:12px}.evidence-card .source{display:flex;align-items:center;gap:8px;color:var(--t2);font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase}.source:before{content:"";width:7px;height:7px;border-radius:99px;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}.evidence-value{font-family:var(--head);font-size:25px;font-weight:850;letter-spacing:-.03em;margin-top:8px}.evidence-meaning{margin-top:6px;color:var(--t1);line-height:1.5;font-size:12px}.evidence-impact{margin-top:9px;color:var(--t2);font-size:11px}.evidence-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.metric{border:1px solid var(--line2);border-radius:var(--r-md);background:color-mix(in srgb,var(--bg2) 82%,transparent);padding:12px;min-width:0}.metric .k{color:var(--t2);font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;margin-bottom:7px}.metric .v{color:var(--t0);font-family:var(--head);font-size:23px;font-weight:800;letter-spacing:-.03em}.metric .s{color:var(--t2);margin-top:4px;font-size:11px}
.table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}.table th{text-align:left;color:var(--t2);font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;padding:8px 10px;border-bottom:1px solid var(--line2)}.table td{color:var(--t1);padding:9px 10px;border-bottom:1px solid var(--line2)}.table tr:hover td{background:color-mix(in srgb,var(--cyan) 4%,transparent)}
.chart-wrap{position:relative;min-height:250px;height:100%;background:linear-gradient(var(--line2) 1px,transparent 1px),linear-gradient(90deg,var(--line2) 1px,transparent 1px),var(--bg2);background-size:100% 48px,78px 100%;border-radius:0 0 var(--r-lg) var(--r-lg)}.chart-canvas{display:block;width:100%;height:100%}
.item-list{display:flex;flex-direction:column;gap:8px}.item{border:1px solid var(--line2);border-radius:var(--r-md);background:color-mix(in srgb,var(--bg2) 82%,transparent);padding:10px 11px}.item-row{display:flex;align-items:center;gap:9px}.item-icon{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:color-mix(in srgb,var(--cyan) 12%,transparent);color:var(--cyan);flex:0 0 auto;font-weight:800}.item-main{flex:1;min-width:0}.item-title{font-weight:700;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.item-sub{margin-top:3px;color:var(--t2);font-size:11px;line-height:1.45}
.tag{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:999px;border:1px solid var(--line);color:var(--t2);background:color-mix(in srgb,var(--bg1) 60%,transparent);font-family:var(--mono);font-size:9px;letter-spacing:.06em;white-space:nowrap}.tag.cyan{color:var(--cyan);border-color:color-mix(in srgb,var(--cyan) 34%,var(--line))}.tag.green{color:var(--green);border-color:color-mix(in srgb,var(--green) 34%,var(--line))}.tag.amber{color:var(--amber);border-color:color-mix(in srgb,var(--amber) 38%,var(--line))}.tag.red{color:var(--red);border-color:color-mix(in srgb,var(--red) 34%,var(--line))}.tag.purple{color:var(--purple);border-color:color-mix(in srgb,var(--purple) 34%,var(--line))}
.up{color:var(--green)!important}.down{color:var(--red)!important}.warn{color:var(--amber)!important}.info{color:var(--cyan)!important}.sym{color:var(--t0);font-weight:800}.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.space{flex:1}.muted{color:var(--t2)}.soft{color:var(--t1)}.mono{font-family:var(--mono)}.mt8{margin-top:8px}.mb8{margin-bottom:8px}.input,textarea,select{width:100%;border:1px solid var(--line);border-radius:10px;background:var(--bg2);color:var(--t0);padding:10px 12px;outline:0}

/* command palette */
.cmd-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.46);backdrop-filter:blur(10px);align-items:flex-start;justify-content:center;padding-top:88px}.cmd-overlay.open{display:flex}.cmd-box{width:min(760px,calc(100vw - 32px));border:1px solid color-mix(in srgb,var(--cyan) 35%,var(--line));background:color-mix(in srgb,var(--bg1) 96%,transparent);border-radius:18px;overflow:hidden;box-shadow:0 30px 100px rgba(0,0,0,.55),var(--glow)}.cmd-input{display:flex;align-items:center;gap:12px;padding:18px;border-bottom:1px solid var(--line)}.cmd-input span{color:var(--cyan);font-size:20px;font-weight:900}.cmd-input input{flex:1;border:0;outline:0;background:transparent;color:var(--t0);font-size:16px}.cmd-results{padding:9px}.cmd-result{display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center;padding:11px 12px;border-radius:12px;cursor:pointer}.cmd-result:hover{background:color-mix(in srgb,var(--cyan) 8%,transparent)}.cmd-result .ico{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;color:var(--cyan);background:color-mix(in srgb,var(--cyan) 10%,transparent)}.cmd-result strong{display:block;color:var(--t0);margin-bottom:2px}.cmd-result small{color:var(--t2)}.cmd-result code{color:var(--t2);font-family:var(--mono);font-size:10px}

@media(max-width:1420px){.detail-grid{grid-template-columns:310px minmax(470px,1fr) 320px}.nav-btn{padding:0 6px;font-size:8.8px}.judgment{grid-template-columns:1fr 1fr}.judgment>.panel:last-child{display:none}}
@media(max-width:980px){body{overflow:auto}.app{min-height:100vh;height:auto;grid-template-rows:auto 28px auto}.tray{height:auto;min-height:42px;flex-wrap:wrap}.brand{width:auto}.nav{order:3;width:100%;flex-basis:100%;overflow-x:auto}.tray-right{margin-left:auto}.page,.page.active{position:relative;display:block;opacity:1}.page:not(.active){display:none}.page-shell{height:auto;overflow:visible}.tab-grid,.detail-grid,.judgment{display:block;height:auto}.panel{margin-bottom:12px}.evidence-grid,.metric-grid{grid-template-columns:1fr}}
</style>
</head>

<div class="app">

function evidence(source,value,meaning,impact){return `<div class="evidence-card"><div class="source">${source}</div><div class="evidence-value">${value}</div><div class="evidence-meaning">${meaning}</div><div class="evidence-impact">${impact}</div></div>`}
function miniList(title,items){return `<div class="panel soft"><div class="panel-head"><div class="panel-title">${title}</div></div><div class="panel-body item-list">${items.map(([t,s])=>`<div class="item"><div class="item-title">${t}</div><div class="item-sub">${s}</div></div>`).join("")}</div></div>`}
function judgmentOutput(k,v,note){return `<div class="evidence-card mb8"><div class="source">${k}</div><div class="evidence-value">${v}</div><div class="evidence-meaning">${note}</div><div class="evidence-impact">Judgment, not execution instruction</div></div>`}
function panel(title,body,badge=""){return `<div class="panel"><div class="panel-head"><div class="window-dots"><span></span><span></span><span></span></div><div class="panel-title">${title}</div>${badge?`<span class="panel-badge">${badge}</span>`:""}</div><div class="panel-body">${body}</div></div>`}
function chartPanel(title,id,badge="Evidence"){return `<div class="panel"><div class="panel-head"><div class="window-dots"><span></span><span></span><span></span></div><div class="panel-title">${title}</div><span class="panel-badge">${badge}</span></div><div class="chart-wrap" style="height:280px"><canvas class="chart-canvas" id="${id}"></canvas></div></div>`}
function judgmentHeader(d){return `<div class="judgment">
  <div class="panel"><div class="judgment-main"><div class="eyebrow">${d.eyebrow}</div><div class="judgment-title">${d.title}</div><div class="judgment-summary">${d.summary}</div><div class="confidence-row"><span class="tag cyan">Confidence</span><div class="confidence-meter" style="--w:${d.confidence}%"><span></span></div><span class="tag ${d.confidence>75?"green":d.confidence>60?"amber":"red"}">${d.confidence}%</span></div></div></div>
  ${panel("Primary Drivers", `<div class="driver-list">${d.drivers.map(([score,t,n])=>`<div class="driver"><div class="driver-score">${score}</div><div><div class="driver-title">${t}</div><div class="driver-note">${n}</div></div></div>`).join("")}</div>`, "Evidence")}
  ${panel("Conflicts / Watch", `<div class="conflict-list">${d.conflicts.map(([t,n])=>`<div class="conflict"><div class="conflict-title">${t}</div><div class="conflict-note">${n}</div></div>`).join("")}</div><div class="watch-list mt8">${d.watch.map(([t,n])=>`<div class="watch"><div class="watch-title">${t}</div><div class="watch-note">${n}</div></div>`).join("")}</div>`, "Review")}
</div>`}
function renderPage(id,d){const chartId=`chart-${id}`;return `<section class="page ${id==="control"?"active":""}" id="page-${id}"><div class="page-shell"><div class="tab-grid">
${judgmentHeader(d)}
<div class="detail-grid">
  <div class="column scroll">${panel(d.leftTitle,d.left,"Evidence")}</div>
  <div class="column scroll">${d.chart?chartPanel(d.centerTitle,chartId,d.chart==="candle"?"Chart":d.chart==="bar"?"Map":"Tape"):""}${panel(d.centerTitle,d.centerExtra,"Synthesis")}</div>
  <div class="column scroll">${panel(d.rightTitle,d.right,"Output")}</div>
</div>
</div></div></section>`}
function boot(){document.getElementById("nav").innerHTML=tabs.map(t=>`<button class="nav-btn ${t.id==="control"?"active":""}" data-page="${t.id}"><span class="nav-dot"></span>${t.label}</button>`).join("");document.getElementById("workspace").innerHTML=tabs.map(t=>renderPage(t.id,pages[t.id])).join("");document.getElementById("cmdResults").innerHTML=tabs.map(t=>`<div class="cmd-result" data-page="${t.id}"><div class="ico">⌁</div><div><strong>Open ${t.label}</strong><small>Review evidence-to-judgment panel</small></div><code>GO</code></div>`).join("");initTicker();initNav();initControls();updateClock();setInterval(updateClock,1000);setTimeout(drawAllCharts,120);window.addEventListener("resize",()=>setTimeout(drawAllCharts,80))}
function initTicker(){document.getElementById("tickerScroll").innerHTML=[...tickers,...tickers].map(([sym,px,ch,cls])=>`<div class="ticker-item"><span class="ticker-symbol">${sym}</span><span class="ticker-price">${px}</span><span class="ticker-change ${cls}">${ch}</span></div>`).join("")}
function initNav(){document.querySelectorAll(".nav-btn,.cmd-result").forEach(btn=>btn.addEventListener("click",()=>{setPage(btn.dataset.page);document.getElementById("cmdOverlay").classList.remove("open")}))}
function setPage(id){document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));document.getElementById(`page-${id}`)?.classList.add("active");document.querySelectorAll(".nav-btn").forEach(btn=>btn.classList.toggle("active",btn.dataset.page===id));setTimeout(drawAllCharts,60)}
const themeNames=["material","cyber","light"];let themeIndex=0;function initControls(){const overlay=document.getElementById("cmdOverlay");document.getElementById("cmdOpen").addEventListener("click",()=>overlay.classList.add("open"));overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.classList.remove("open")});document.getElementById("themeBtn").addEventListener("click",()=>{themeIndex=(themeIndex+1)%themeNames.length;const theme=themeNames[themeIndex];document.documentElement.dataset.theme=theme;document.getElementById("themeBtn").textContent="Theme · "+(theme==="material"?"Material":theme==="cyber"?"Cyber":"Light");setTimeout(drawAllCharts,80)});document.addEventListener("keydown",e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();overlay.classList.toggle("open");if(overlay.classList.contains("open"))document.getElementById("cmdInput").focus()}if(e.key==="Escape")overlay.classList.remove("open")})}
function updateClock(){document.getElementById("clock").textContent=new Date().toLocaleTimeString("ko-KR",{hour12:false})}
function css(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim()}function resizeCanvas(canvas){const rect=canvas.getBoundingClientRect();const dpr=window.devicePixelRatio||1;canvas.width=Math.max(1,Math.floor(rect.width*dpr));canvas.height=Math.max(1,Math.floor(rect.height*dpr));const ctx=canvas.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);return{ctx,w:rect.width,h:rect.height}}
let seed=42;function rnd(){seed=(seed*1664525+1013904223)%4294967296;return seed/4294967296}function series(n,start=100,vol=4,trend=.2){let y=start;return Array.from({length:n},(_,i)=>{y+=Math.sin(i*.28)*vol*.22+(rnd()-.44)*vol+trend;return y})}
function drawLine(canvas,label){const{ctx,w,h}=resizeCanvas(canvas);ctx.clearRect(0,0,w,h);const line=css("--line2"),cyan=css("--cyan"),amber=css("--amber"),green=css("--green"),text=css("--t1");for(let i=0;i<6;i++){ctx.strokeStyle=line;ctx.beginPath();ctx.moveTo(0,i*h/5);ctx.lineTo(w,i*h/5);ctx.stroke()}seed=42;const s=series(80),min=Math.min(...s),max=Math.max(...s),pad=24,x=i=>pad+i*(w-pad*2)/(s.length-1),y=v=>h-pad-(v-min)/(max-min||1)*(h-pad*2);const grad=ctx.createLinearGradient(0,pad,0,h-pad);grad.addColorStop(0,"rgba(107,220,255,.25)");grad.addColorStop(1,"rgba(107,220,255,0)");ctx.beginPath();s.forEach((v,i)=>i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v)));ctx.lineTo(x(s.length-1),h-pad);ctx.lineTo(x(0),h-pad);ctx.closePath();ctx.fillStyle=grad;ctx.fill();ctx.beginPath();s.forEach((v,i)=>i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v)));ctx.lineWidth=2.2;ctx.strokeStyle=cyan;ctx.shadowColor=cyan;ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;const s2=series(80,94,3,.07),min2=Math.min(...s2,min),max2=Math.max(...s2,max),y2=v=>h-pad-(v-min2)/(max2-min2||1)*(h-pad*2);ctx.beginPath();s2.forEach((v,i)=>i?ctx.lineTo(x(i),y2(v)):ctx.moveTo(x(i),y2(v)));ctx.lineWidth=1.5;ctx.strokeStyle=amber;ctx.setLineDash([6,5]);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=text;ctx.font="11px ui-monospace, monospace";ctx.fillText(label,18,20);ctx.fillStyle=green;ctx.fillText("+12.8%",w-74,20)}
function drawCandle(canvas){const{ctx,w,h}=resizeCanvas(canvas);ctx.clearRect(0,0,w,h);const green=css("--green"),red=css("--red"),cyan=css("--cyan"),purple=css("--purple"),line=css("--line2"),text=css("--t1");for(let i=0;i<7;i++){ctx.strokeStyle=line;ctx.beginPath();ctx.moveTo(0,i*h/6);ctx.lineTo(w,i*h/6);ctx.stroke()}seed=88;let price=120;const cs=[];for(let i=0;i<62;i++){const o=price+(rnd()-.5)*3,c=o+(rnd()-.43)*8+Math.sin(i*.18)*.8,hi=Math.max(o,c)+rnd()*5,lo=Math.min(o,c)-rnd()*5;price=c;cs.push({o,c,hi,lo})}const min=Math.min(...cs.map(c=>c.lo)),max=Math.max(...cs.map(c=>c.hi)),pad=28,bw=Math.max(3,(w-pad*2)/cs.length*.55),x=i=>pad+i*(w-pad*2)/(cs.length-1),y=v=>h-pad-(v-min)/(max-min)*(h-pad*2);cs.forEach((c,i)=>{const up=c.c>=c.o;ctx.strokeStyle=up?green:red;ctx.fillStyle=up?green:red;const xx=x(i);ctx.beginPath();ctx.moveTo(xx,y(c.hi));ctx.lineTo(xx,y(c.lo));ctx.stroke();ctx.fillRect(xx-bw/2,y(Math.max(c.o,c.c)),bw,Math.max(2,Math.abs(y(c.o)-y(c.c))))});ctx.lineWidth=1.6;ctx.strokeStyle=cyan;ctx.beginPath();cs.forEach((c,i)=>{const v=c.c+Math.sin(i*.15)*2;i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v))});ctx.stroke();ctx.strokeStyle=purple;ctx.beginPath();cs.forEach((c,i)=>{const v=c.c-5+Math.cos(i*.11)*2.5;i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v))});ctx.stroke();ctx.fillStyle=text;ctx.font="11px ui-monospace, monospace";ctx.fillText("Candle · EMA20 · EMA60 · stored bars",18,20)}
function drawBar(canvas){const{ctx,w,h}=resizeCanvas(canvas);ctx.clearRect(0,0,w,h);const colors=[css("--cyan"),css("--amber"),css("--green"),css("--purple"),css("--red")],labels=["Semis","Mega Tech","Cash","Space","Other"],values=[31,25,13,9,22],pad=32,bw=(w-pad*2)/values.length*.54;values.forEach((v,i)=>{const x=pad+i*(w-pad*2)/values.length+bw/2,bh=(h-pad*2)*v/36;ctx.fillStyle=colors[i];ctx.fillRect(x,h-pad-bh,bw,bh);ctx.fillStyle=css("--t1");ctx.font="11px ui-monospace, monospace";ctx.fillText(labels[i],x-8,h-12);ctx.fillText(v+"%",x,h-pad-bh-8)})}
function drawAllCharts(){document.querySelectorAll("canvas").forEach(canvas=>{if(!canvas.offsetParent)return;const id=canvas.id;const d=Object.values(pages).find(p=>`chart-${Object.keys(pages).find(k=>pages[k]===p)}`===id);if(id.includes("kernel")||id.includes("symbol"))drawCandle(canvas);else if(id.includes("mission"))drawBar(canvas);else drawLine(canvas, id.includes("analysis")?"Index overlay · relative strength":"Normalized evidence tape · not prediction")})}
document.addEventListener("DOMContentLoaded",boot);
</script>
</body>
