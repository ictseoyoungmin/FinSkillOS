services:
  postgres:
    image: postgres:16-alpine
    container_name: finskillos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finskillos}
      POSTGRES_USER: ${POSTGRES_USER:-finskillos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finskillos_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finskillos} -d ${POSTGRES_DB:-finskillos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------
  # Slice 112 — one-shot schema bootstrap. Runs `alembic upgrade head`
  # (idempotent) before api + worker start, so a plain `docker compose up`
  # works on a fresh volume without a manual migration step.
  # ------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: finskillos-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-finskillos}:${POSTGRES_PASSWORD:-finskillos_dev_password}@postgres:5432/${POSTGRES_DB:-finskillos}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  # ------------------------------------------------------------------
  # Streamlit (Slice 02–13.5). Kept intact as the debug / admin UI;
  # the React cockpit ships alongside via the `api` + `web` services.
  # ------------------------------------------------------------------
  app:
    build: .
    profiles: ["app"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-finskillos}:${POSTGRES_PASSWORD:-finskillos_dev_password}@postgres:5432/${POSTGRES_DB:-finskillos}
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

  # ------------------------------------------------------------------
  # Slice 13.6 — FastAPI read-only adapter for the React cockpit.
  # ------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: finskillos-api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-finskillos}:${POSTGRES_PASSWORD:-finskillos_dev_password}@postgres:5432/${POSTGRES_DB:-finskillos}
      FINSKILLOS_CORS_ORIGINS: ${FINSKILLOS_CORS_ORIGINS:-http://localhost:5173,http://web,http://localhost:3000}
      FINSKILLOS_LOGO_PROVIDER: ${FINSKILLOS_LOGO_PROVIDER:-logo_dev}
      FINSKILLOS_LOGO_DEV_TOKEN: ${FINSKILLOS_LOGO_DEV_TOKEN:-}
      FINSKILLOS_REFRESH_FOLDER_NAMES: ${FINSKILLOS_REFRESH_FOLDER_NAMES:-}
      FINSKILLOS_CONTROL_ROOM_STALE_AFTER_DAYS: ${FINSKILLOS_CONTROL_ROOM_STALE_AFTER_DAYS:-3}
      FINSKILLOS_CONTROL_ROOM_MARKET_STALE_AFTER_DAYS: ${FINSKILLOS_CONTROL_ROOM_MARKET_STALE_AFTER_DAYS:-}
      FINSKILLOS_CONTROL_ROOM_WATCHLIST_STALE_AFTER_DAYS: ${FINSKILLOS_CONTROL_ROOM_WATCHLIST_STALE_AFTER_DAYS:-}
      # v3 Phase 11: agent LLM provider. Default to the local llama.cpp gateway on
      # the host (reachable from the container via host.docker.internal). Override
      # the provider in the Ops tab or via these env vars.
      FINSKILLOS_LLM_PROVIDER: ${FINSKILLOS_LLM_PROVIDER:-local}
      FINSKILLOS_LOCAL_LLM_BASE_URL: ${FINSKILLOS_LOCAL_LLM_BASE_URL:-http://host.docker.internal:18080}
      FINSKILLOS_LOCAL_LLM_MODEL: ${FINSKILLOS_LOCAL_LLM_MODEL:-local-llama}
      FINSKILLOS_GEMINI_API_KEY: ${FINSKILLOS_GEMINI_API_KEY:-}
      # v4: USD→KRW FX + Toss Securities Open API (read-only; no buy/sell).
      FINSKILLOS_USD_KRW_RATE: ${FINSKILLOS_USD_KRW_RATE:-}
      FINSKILLOS_TOSS_CLIENT_ID: ${FINSKILLOS_TOSS_CLIENT_ID:-}
      FINSKILLOS_TOSS_CLIENT_SECRET: ${FINSKILLOS_TOSS_CLIENT_SECRET:-}
      FINSKILLOS_TOSS_ACCOUNT_SEQ: ${FINSKILLOS_TOSS_ACCOUNT_SEQ:-}
      FINSKILLOS_TOSS_BASE_URL: ${FINSKILLOS_TOSS_BASE_URL:-https://openapi.tossinvest.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ------------------------------------------------------------------
  # Slice 13.6 — Vite React frontend (dev mode by default).
  # ------------------------------------------------------------------
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: finskillos-web
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      VITE_API_BASE_URL: /api
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started

  # ------------------------------------------------------------------
  # Slice 172 — local release profile. Serves the built React bundle via the
  # nginx `runtime` stage (static + /api proxy to the api service), instead of
  # the Vite dev server. Opt-in and explicit so it never collides with the dev
  # `web` service on the default `docker compose up`:
  #   docker compose --profile release up -d web-release   # → http://localhost:8080
  # (or `./fsoctl.sh release`). Build args bake VITE_API_BASE_URL=/api.
  # ------------------------------------------------------------------
  web-release:
    profiles: ["release"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_BASE_URL: /api
    container_name: finskillos-web-release
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_started

  # ------------------------------------------------------------------
  # Slice 26 / 112 — lightweight refresh worker. Starts with the default
  # `docker compose up` (web + api + worker + db together) so the dashboard
  # stays fresh from real data on an interval (and, from Slice 113, on demand
  # via the Postgres job queue). `restart: unless-stopped` keeps it alive
  # across transient provider/network errors (a failed cycle is logged and the
  # loop continues; nothing is written on failure, so no junk).
  # ------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: finskillos-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-finskillos}:${POSTGRES_PASSWORD:-finskillos_dev_password}@postgres:5432/${POSTGRES_DB:-finskillos}
      FINSKILLOS_MARKET_REFRESH_ADAPTER: ${FINSKILLOS_MARKET_REFRESH_ADAPTER:-yahoo}
      FINSKILLOS_MARKET_REFRESH_TICKERS: ${FINSKILLOS_MARKET_REFRESH_TICKERS:-SPY,QQQ,DIA,IWM,SMH,SOXX,XLK,XLF,XLE,XLV,XLI,XLY,XLP,XLU,NVDA,TSLA,AAPL,MSFT,AMZN,VIX,US10Y,DXY}
      FINSKILLOS_INDICATOR_REFRESH_TICKERS: ${FINSKILLOS_INDICATOR_REFRESH_TICKERS:-SPY,QQQ,DIA,IWM,SMH,SOXX,XLK,XLF,XLE,XLV,XLI,XLY,XLP,XLU,NVDA,TSLA,AAPL,MSFT,AMZN,VIX,US10Y,DXY}
      FINSKILLOS_WORKER_INTERVAL_SECONDS: ${FINSKILLOS_WORKER_INTERVAL_SECONDS:-86400}
      FINSKILLOS_WORKER_POLL_SECONDS: ${FINSKILLOS_WORKER_POLL_SECONDS:-5}
      FINSKILLOS_WORKER_RUN_ON_START: ${FINSKILLOS_WORKER_RUN_ON_START:-1}
      FINSKILLOS_WORKER_MARKET_ENABLED: ${FINSKILLOS_WORKER_MARKET_ENABLED:-1}
      FINSKILLOS_WORKER_NEWS_ENABLED: ${FINSKILLOS_WORKER_NEWS_ENABLED:-1}
      FINSKILLOS_WORKER_INDICATOR_ENABLED: ${FINSKILLOS_WORKER_INDICATOR_ENABLED:-1}
      FINSKILLOS_WORKER_PERSIST_INDICATOR_HISTORY: ${FINSKILLOS_WORKER_PERSIST_INDICATOR_HISTORY:-0}
      FINSKILLOS_NEWS_REFRESH_ADAPTER: ${FINSKILLOS_NEWS_REFRESH_ADAPTER:-rss}
      FINSKILLOS_NEWS_RSS_FEEDS: ${FINSKILLOS_NEWS_RSS_FEEDS:-}
      FINSKILLOS_NEWS_RSS_TICKERS: ${FINSKILLOS_NEWS_RSS_TICKERS:-AAPL,MSFT,NVDA,TSLA}
      FINSKILLOS_NEWS_RSS_SOURCE: ${FINSKILLOS_NEWS_RSS_SOURCE:-}
      FINSKILLOS_NEWS_RSS_LANGUAGE: ${FINSKILLOS_NEWS_RSS_LANGUAGE:-en-US}
      FINSKILLOS_LOGO_PROVIDER: ${FINSKILLOS_LOGO_PROVIDER:-logo_dev}
      FINSKILLOS_LOGO_DEV_TOKEN: ${FINSKILLOS_LOGO_DEV_TOKEN:-}
      FINSKILLOS_REFRESH_FOLDER_NAMES: ${FINSKILLOS_REFRESH_FOLDER_NAMES:-}
      # v4 Phase 14: daily Toss portfolio auto-sync (source of truth) + FX.
      FINSKILLOS_USD_KRW_RATE: ${FINSKILLOS_USD_KRW_RATE:-}
      FINSKILLOS_TOSS_CLIENT_ID: ${FINSKILLOS_TOSS_CLIENT_ID:-}
      FINSKILLOS_TOSS_CLIENT_SECRET: ${FINSKILLOS_TOSS_CLIENT_SECRET:-}
      FINSKILLOS_TOSS_ACCOUNT_SEQ: ${FINSKILLOS_TOSS_ACCOUNT_SEQ:-}
      FINSKILLOS_TOSS_BASE_URL: ${FINSKILLOS_TOSS_BASE_URL:-https://openapi.tossinvest.com}
      FINSKILLOS_TOSS_SYNC_ENABLED: ${FINSKILLOS_TOSS_SYNC_ENABLED:-1}
    command: ["python", "scripts/refresh_worker.py"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ------------------------------------------------------------------
  # Slice 13.6 — Playwright e2e runner (Slice 13.6 cleanup §4).
  # Self-contained image: frontend/Dockerfile.e2e bakes node_modules
  # via `npm ci` so a fresh clone can run the suite without a
  # pre-existing /work/frontend/node_modules volume.
  # Activated via the `e2e` profile so it never starts implicitly.
  # Usage:
  #   docker compose --profile e2e run --rm e2e
  #   docker compose --profile e2e run --rm e2e npm run test:visual
  # ------------------------------------------------------------------
  e2e:
    build:
      context: .
      dockerfile: frontend/Dockerfile.e2e
    profiles: ["e2e"]
    working_dir: /work/frontend
    environment:
      PLAYWRIGHT_BASE_URL: http://web:5173
      CI: "1"
    volumes:
      - ./frontend/e2e:/work/frontend/e2e
      - ./frontend/playwright-report:/work/frontend/playwright-report
      - ./frontend/test-results:/work/frontend/test-results
    depends_on:
      - web

volumes:
  # Compose key is unchanged from the original docker-compose.yml so
  # the existing on-disk Postgres data is preserved across docker
  # stop / start cycles. The user explicitly asked not to require
  # `docker compose down -v` for normal lifecycle operations.
  postgres_data:
