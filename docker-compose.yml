services:
  postgres:
    image: postgres:16-alpine
    container_name: finskillos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finskillos}
      POSTGRES_USER: ${POSTGRES_USER:-finskillos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finskillos_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finskillos} -d ${POSTGRES_DB:-finskillos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------
  # Streamlit (Slice 02–13.5). Kept intact as the debug / admin UI;
  # the React cockpit ships alongside via the `api` + `web` services.
  # ------------------------------------------------------------------
  app:
    build: .
    profiles: ["app"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-finskillos}:${POSTGRES_PASSWORD:-finskillos_dev_password}@postgres:5432/${POSTGRES_DB:-finskillos}
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

  # ------------------------------------------------------------------
  # Slice 13.6 — FastAPI read-only adapter for the React cockpit.
  # ------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: finskillos-api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-finskillos}:${POSTGRES_PASSWORD:-finskillos_dev_password}@postgres:5432/${POSTGRES_DB:-finskillos}
      FINSKILLOS_CORS_ORIGINS: ${FINSKILLOS_CORS_ORIGINS:-http://localhost:5173,http://web,http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # ------------------------------------------------------------------
  # Slice 13.6 — Vite React frontend (dev mode by default).
  # ------------------------------------------------------------------
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: finskillos-web
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      VITE_API_BASE_URL: /api
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started

  # ------------------------------------------------------------------
  # Slice 26 — optional lightweight refresh worker.
  # Runs market-bar refresh and indicator calculation on an interval.
  # Activated via the `worker` profile so normal local UI startup remains
  # explicit and deterministic.
  # Usage:
  #   docker compose --profile worker up -d worker
  # ------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: finskillos-worker
    profiles: ["worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-finskillos}:${POSTGRES_PASSWORD:-finskillos_dev_password}@postgres:5432/${POSTGRES_DB:-finskillos}
      FINSKILLOS_MARKET_REFRESH_ADAPTER: ${FINSKILLOS_MARKET_REFRESH_ADAPTER:-mock}
      FINSKILLOS_MARKET_REFRESH_TICKERS: ${FINSKILLOS_MARKET_REFRESH_TICKERS:-SPY,QQQ,NVDA,TSLA,AAPL,MSFT,AMZN,SMH,SOXX,VIX,US10Y,DXY}
      FINSKILLOS_INDICATOR_REFRESH_TICKERS: ${FINSKILLOS_INDICATOR_REFRESH_TICKERS:-SPY,QQQ,NVDA,TSLA,AAPL,MSFT,AMZN,SMH,SOXX,VIX,US10Y,DXY}
      FINSKILLOS_WORKER_INTERVAL_SECONDS: ${FINSKILLOS_WORKER_INTERVAL_SECONDS:-86400}
      FINSKILLOS_WORKER_RUN_ON_START: ${FINSKILLOS_WORKER_RUN_ON_START:-1}
      FINSKILLOS_WORKER_MARKET_ENABLED: ${FINSKILLOS_WORKER_MARKET_ENABLED:-1}
      FINSKILLOS_WORKER_INDICATOR_ENABLED: ${FINSKILLOS_WORKER_INDICATOR_ENABLED:-1}
      FINSKILLOS_WORKER_PERSIST_INDICATOR_HISTORY: ${FINSKILLOS_WORKER_PERSIST_INDICATOR_HISTORY:-0}
    command: ["python", "scripts/refresh_worker.py"]
    depends_on:
      postgres:
        condition: service_healthy

  # ------------------------------------------------------------------
  # Slice 13.6 — Playwright e2e runner (Slice 13.6 cleanup §4).
  # Self-contained image: frontend/Dockerfile.e2e bakes node_modules
  # via `npm ci` so a fresh clone can run the suite without a
  # pre-existing /work/frontend/node_modules volume.
  # Activated via the `e2e` profile so it never starts implicitly.
  # Usage:
  #   docker compose --profile e2e run --rm e2e
  #   docker compose --profile e2e run --rm e2e npm run test:visual
  # ------------------------------------------------------------------
  e2e:
    build:
      context: .
      dockerfile: frontend/Dockerfile.e2e
    profiles: ["e2e"]
    working_dir: /work/frontend
    environment:
      PLAYWRIGHT_BASE_URL: http://web:5173
      CI: "1"
    volumes:
      - ./frontend/e2e:/work/frontend/e2e
      - ./frontend/playwright-report:/work/frontend/playwright-report
      - ./frontend/test-results:/work/frontend/test-results
    depends_on:
      - web

volumes:
  # Compose key is unchanged from the original docker-compose.yml so
  # the existing on-disk Postgres data is preserved across docker
  # stop / start cycles. The user explicitly asked not to require
  # `docker compose down -v` for normal lifecycle operations.
  postgres_data:
